name: flowdiagramapp
description: "Flow diagram generator application"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Base ────────────────────────────────────────────────────────────────────
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  image_picker: ^1.1.2
  provider: ^6.1.1
  intl: ^0.18.1

  # ── Firebase ────────────────────────────────────────────────────────────────
  firebase_core: ^2.32.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_analytics: ^10.10.7
  firebase_crashlytics: ^3.5.7

  # ── Almacenamiento seguro (reemplaza SharedPreferences para datos de sesión)
  # Usa Android Keystore / iOS Secure Enclave. Cifrado en reposo.
  flutter_secure_storage: ^9.2.2

  # ── Red ─────────────────────────────────────────────────────────────────────
  connectivity_plus: ^5.0.2

  # ── UI / UX ─────────────────────────────────────────────────────────────────
  fl_chart: ^0.68.0
  confetti: ^0.7.0
  tutorial_coach_mark: ^1.2.11
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  cupertino_icons: ^1.0.2

  # ── Exportación ─────────────────────────────────────────────────────────────
  pdf: ^3.10.7
  printing: ^5.12.0
  image: ^4.1.7
  permission_handler: ^11.3.0
  device_info_plus: ^10.1.0
  package_info_plus: ^6.0.0
  saver_gallery: ^3.0.6
  url_launcher: ^6.3.0
  webview_flutter: ^4.10.0

  # shared_preferences ya no se usa para sesión de usuario.
  # Si otros módulos lo necesitan para preferencias NO sensibles, mantenlo:
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/templates/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/icon/app_icon.png"
  android_12:
    image: "assets/icon/app_icon.png"
    color: "#FFFFFF"
  web: false